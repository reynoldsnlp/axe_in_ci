name: Accessibility (axe-cli)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install axe-cli
        run: npm install -g @axe-core/cli

      - name: Start static server
        working-directory: site
        run: |
          python3 -m http.server 8000 >/tmp/http.log 2>&1 &
          echo $! > /tmp/http.pid
          # Wait for the server to be ready
          for i in {1..20}; do
            if curl -fsS http://localhost:8000/ >/dev/null; then
              echo "Server is up"
              exit 0
            fi
            sleep 0.5
          done
          echo "Server failed to start"; cat /tmp/http.log; exit 1

      - name: Run axe-cli
        run: |
          mkdir -p axe-reports
          axe \
            http://localhost:8000/ \
            http://localhost:8000/about.html \
            --exit \
            --save axe-reports/results.json

      - name: Upload axe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-report
          path: axe-reports/

      - name: Stop static server
        if: always()
        run: kill "$(cat /tmp/http.pid)" || true
